<style>
  /* Fix year label readability on publications page */
  h2.bibliography {
    opacity: 0.35 !important;
  }
</style>

<script>
// Colour abbreviation badges by venue
document.addEventListener("DOMContentLoaded", function () {
  // Accessible colour palette — distinct hues, all pass WCAG AA on white text
  var colours = [
    "#2196F3", // blue
    "#4CAF50", // green
    "#9C27B0", // purple
    "#FF5722", // deep orange
    "#00897B", // teal
    "#E91E63", // pink
    "#3F51B5", // indigo
    "#E65100", // dark orange (replaces #FF9800)
    "#607D8B", // blue grey
    "#795548", // brown
    "#009688", // dark teal
    "#673AB7", // deep purple
    "#F44336", // red
    "#01579B", // dark blue (replaces #03A9F4)
    "#33691E", // dark green (replaces #8BC34A)
    "#C2185B", // dark pink
    "#0288D1", // darker blue
    "#558B2F", // olive
  ];

  // Deterministic hash so same venue always gets same colour
  function hash(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) {
      h = ((h << 5) - h + str.charCodeAt(i)) | 0;
    }
    return Math.abs(h);
  }

  var badges = document.querySelectorAll(".abbr abbr");
  badges.forEach(function (badge) {
    var text = badge.textContent.trim();
    var idx = hash(text) % colours.length;
    badge.style.backgroundColor = colours[idx];
  });
});
</script>
