    Research Statement:
      - "My research focuses on **social relationships** (romantic relationships, friendships, family relationships) and the role of **individual differences** (personality, height, hormones) from an **interdisciplinary framework**. I also work on improving **methodology and statistics**. The full publication list (146+ papers, preprints, and book chapters) is available on the [publications page](/new_website/publications/). ResearcherID: [H-3397-2012](http://www.researcherid.com/rid/H-3397-2012)."

