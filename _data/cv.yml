  location: Newcastle upon Tyne, UK
  image: ""
  summary: >-
    My research focuses on understanding the wealth of social relationships people have
    (e.g., romantic relationships, friendships, family relationships) and understanding the role
    of individual differences (e.g., personality, height, hormones) for these social relationships
    from an interdisciplinary framework. I conduct survey, observational, and experimental studies,
    next to analysing secondary datasets. I am also interested in improving methodology and statistics
    and frequently collaborate with others on diverse topics.
